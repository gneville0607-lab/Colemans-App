name: RC Wake Check

on:
  schedule:
    # GitHub Actions cron is UTC. We list times for BOTH Eastern Daylight (UTC-4)
    # and Eastern Standard (UTC-5) so the bot stays correct year-round.
    # The script itself checks the local time and skips if it's not the
    # right moment, so only ONE of each pair actually does anything.

    # ~9:30 AM Eastern (morning wake-check message)
    - cron: "30 13 * * 1-5"   # 9:30 AM EDT
    - cron: "30 14 * * 1-5"   # 9:30 AM EST

    # ~9:55 AM Eastern (summary message)
    - cron: "55 13 * * 1-5"   # 9:55 AM EDT
    - cron: "55 14 * * 1-5"   # 9:55 AM EST

    # Event reminders: every 15 min, broad window covering 7AM-7PM in both
    # EDT and EST. The script checks the actual local time and exits quickly
    # if outside reminder_window_start/end in config.json.
    - cron: "*/15 11-23 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - summary
          - reminders
      dry_run:
        description: "Dry run (skip Discord, just print/log what would happen)"
        required: true
        default: true
        type: boolean

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Determine mode (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "RUN_MODE=${{ github.event.inputs.mode }}" >> "$GITHUB_ENV"
          echo "DRY_RUN=${{ github.event.inputs.dry_run }}" >> "$GITHUB_ENV"

      - name: Determine mode (scheduled run)
        if: github.event_name == 'schedule'
        run: |
          case "${{ github.event.schedule }}" in
            "30 13 * * 1-5"|"30 14 * * 1-5")
              echo "RUN_MODE=morning" >> "$GITHUB_ENV"
              ;;
            "55 13 * * 1-5"|"55 14 * * 1-5")
              echo "RUN_MODE=summary" >> "$GITHUB_ENV"
              ;;
            *)
              echo "RUN_MODE=reminders" >> "$GITHUB_ENV"
              ;;
          esac
          echo "DRY_RUN=false" >> "$GITHUB_ENV"

      - name: Run bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          DRY_RUN: ${{ env.DRY_RUN }}
        run: python main.py "$RUN_MODE"
